name: Check and Build amneziawg-tools

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:
    inputs:
      force_tag:
        description: 'Принудительно собрать конкретный тег (например v1.0.20260223)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  # ─────────────────────────────────────────────
  # 1. Проверяем новый тег
  # ─────────────────────────────────────────────
  check-new-tag:
    name: Check for new upstream tag
    runs-on: ubuntu-latest
    outputs:
      new_tag:      ${{ steps.compare.outputs.new_tag }}
      should_build: ${{ steps.compare.outputs.should_build }}

    steps:
      - name: Checkout this repo
        uses: actions/checkout@v6
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          fetch-depth: 0

      - name: Get latest upstream tag
        id: upstream
        run: |
          LATEST=$(curl -sf \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/amnezia-vpn/amneziawg-tools/tags?per_page=1" \
            | jq -r '.[0].name')

          if [ -z "$LATEST" ] || [ "$LATEST" = "null" ]; then
            echo "::error::Не удалось получить теги upstream-репозитория"
            exit 1
          fi

          echo "tag=$LATEST" >> "$GITHUB_OUTPUT"
          echo "Последний upstream-тег: $LATEST"

      - name: Get last built tag from this repo
        id: local
        run: |
          LAST_BUILT=$(git tag --list 'built/*' \
            | sed 's|built/||' \
            | sort -V \
            | tail -1)

          echo "tag=${LAST_BUILT:-none}" >> "$GITHUB_OUTPUT"
          echo "Последний собранный тег: ${LAST_BUILT:-none}"

      - name: Compare tags
        id: compare
        run: |
          UPSTREAM="${{ steps.upstream.outputs.tag }}"
          LOCAL="${{ steps.local.outputs.tag }}"
          FORCE="${{ github.event.inputs.force_tag }}"

          if [ -n "$FORCE" ]; then
            echo "Принудительная сборка тега: $FORCE"
            echo "new_tag=$FORCE"     >> "$GITHUB_OUTPUT"
            echo "should_build=true"  >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$UPSTREAM" != "$LOCAL" ]; then
            echo "Обнаружен новый тег: $UPSTREAM (предыдущий: $LOCAL)"
            echo "new_tag=$UPSTREAM"  >> "$GITHUB_OUTPUT"
            echo "should_build=true"  >> "$GITHUB_OUTPUT"
          else
            echo "Новых тегов нет. Сборка не требуется."
            echo "new_tag=$UPSTREAM"  >> "$GITHUB_OUTPUT"
            echo "should_build=false" >> "$GITHUB_OUTPUT"
          fi

  # ─────────────────────────────────────────────
  # 2a. Сборка Linux — нативно в контейнерах
  #     Контейнеры дают правильные системные
  #     заголовки без кросс-компиляторов
  # ─────────────────────────────────────────────
  build-linux:
    name: Build ${{ matrix.artifact_name }}
    needs: check-new-tag
    if: needs.check-new-tag.outputs.should_build == 'true'
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          # Ubuntu — стандартный glibc, совместим с большинством дистрибутивов
          - artifact_name: linux-ubuntu-x64
            container: ubuntu:22.04
            install_cmd: apt-get update -q && apt-get install -y build-essential

          # Alpine — musl libc, статичная линковка, идеален для embedded/минимальных систем
          - artifact_name: linux-alpine-x64
            container: alpine:3.19
            install_cmd: apk add --no-cache linux-headers build-base

          # ARM64 через Alpine: используем многоарочный образ
          - artifact_name: linux-alpine-arm64
            container: arm64v8/alpine:3.19
            install_cmd: apk add --no-cache linux-headers build-base
            runs_on: ubuntu-24.04-arm  # нативный ARM runner GitHub

    env:
      TAG: ${{ needs.check-new-tag.outputs.new_tag }}

    container:
      image: ${{ matrix.container }}

    # Переопределяем runner для ARM-таргета
    # (matrix не позволяет менять runs-on напрямую — используем стандартный runner
    #  и QEMU для ARM-контейнеров, см. шаг ниже)

    steps:
      - name: Install dependencies
        run: ${{ matrix.install_cmd }}

      - name: Clone upstream source at tag ${{ env.TAG }}
        run: |
          # git может отсутствовать в минимальных образах
          if command -v apt-get &>/dev/null; then
            apt-get install -y git
          elif command -v apk &>/dev/null; then
            apk add --no-cache git
          fi

          git clone --depth 1 --branch "$TAG" \
            https://github.com/amnezia-vpn/amneziawg-tools.git src

      - name: Build
        working-directory: src/src
        run: |
          make -j"$(nproc)" \
            WITH_BASHCOMPLETION=no \
            WITH_WGQUICK=no \
            WITH_SYSTEMDUNITS=no

          echo "--- собранные файлы ---"
          ls -lh

      - name: Collect and package
        working-directory: src/src
        run: |
          mkdir staging
          cp wg staging/awg
          # awg-quick — bash-скрипт, берём linux-версию
          cp wg-quick/linux.bash staging/awg-quick

          ARCHIVE="${{ matrix.artifact_name }}.tar.gz"
          # tar может не поддерживать -C в alpine, используем cd
          cd staging && tar -czf "../$ARCHIVE" . && cd ..

          ls -lh "$ARCHIVE"
          echo "ARCHIVE_PATH=src/src/$ARCHIVE" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ env.ARCHIVE_PATH }}
          retention-days: 1

  # ─────────────────────────────────────────────
  # 2b. ARM64 Linux — нативный ARM runner + Alpine
  #     Отдельный job т.к. нужен другой runs-on
  # ─────────────────────────────────────────────
  build-linux-arm64:
    name: Build linux-alpine-arm64
    needs: check-new-tag
    if: needs.check-new-tag.outputs.should_build == 'true'
    # Нативный ARM64 runner — без QEMU, быстро и надёжно
    runs-on: ubuntu-24.04-arm
    container:
      image: alpine:3.19

    env:
      TAG: ${{ needs.check-new-tag.outputs.new_tag }}

    steps:
      - name: Install dependencies
        run: apk add --no-cache linux-headers build-base git

      - name: Clone upstream source at tag ${{ env.TAG }}
        run: |
          git clone --depth 1 --branch "$TAG" \
            https://github.com/amnezia-vpn/amneziawg-tools.git src

      - name: Build
        working-directory: src/src
        run: |
          make -j"$(nproc)" \
            WITH_BASHCOMPLETION=no \
            WITH_WGQUICK=no \
            WITH_SYSTEMDUNITS=no

          ls -lh

      - name: Collect and package
        working-directory: src/src
        run: |
          mkdir staging
          cp wg staging/awg
          cp wg-quick/linux.bash staging/awg-quick

          cd staging && tar -czf "../linux-alpine-arm64.tar.gz" . && cd ..
          ls -lh linux-alpine-arm64.tar.gz
          echo "ARCHIVE_PATH=src/src/linux-alpine-arm64.tar.gz" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          name: linux-alpine-arm64
          path: ${{ env.ARCHIVE_PATH }}
          retention-days: 1

  # ─────────────────────────────────────────────
  # 2c. Windows — нативная сборка через build.cmd
  # ─────────────────────────────────────────────
  build-windows:
    name: Build windows
    needs: check-new-tag
    if: needs.check-new-tag.outputs.should_build == 'true'
    runs-on: windows-latest

    env:
      TAG: ${{ needs.check-new-tag.outputs.new_tag }}

    steps:
      - name: Clone upstream source at tag ${{ env.TAG }}
        run: |
          git clone --depth 1 --branch "$env:TAG" `
            https://github.com/amnezia-vpn/amneziawg-tools.git src

      - name: Build via build.cmd
        working-directory: src
        run: cmd /c build.cmd

      - name: Collect and package
        shell: bash
        working-directory: src
        run: |
          mkdir -p staging

          # build.cmd кладёт результаты в x64/ x86/ arm64/
          for arch in x64 x86 arm64; do
            if [ -d "$arch" ]; then
              mkdir -p "staging/$arch"
              cp "$arch"/*.exe "staging/$arch/" 2>/dev/null || true
              echo "Скопировано из $arch/:"
              ls -lh "staging/$arch/"
            else
              echo "::warning::Директория $arch/ не найдена"
            fi
          done

          # Три отдельных архива — по одному на архитектуру
          for arch in x64 x86 arm64; do
            if [ -d "staging/$arch" ]; then
              zip -j "windows-${arch}.zip" staging/$arch/*.exe
              ls -lh "windows-${arch}.zip"
            fi
          done

      - name: Upload windows-x64
        uses: actions/upload-artifact@v7
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          name: windows-x64
          path: src/windows-x64.zip
          retention-days: 1

      - name: Upload windows-x86
        uses: actions/upload-artifact@v7
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          name: windows-x86
          path: src/windows-x86.zip
          retention-days: 1

      - name: Upload windows-arm64
        uses: actions/upload-artifact@v7
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          name: windows-arm64
          path: src/windows-arm64.zip
          retention-days: 1

  # ─────────────────────────────────────────────
  # 3. Релиз
  # ─────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [check-new-tag, build-linux, build-linux-arm64, build-windows]
    runs-on: ubuntu-latest
    env:
      TAG: ${{ needs.check-new-tag.outputs.new_tag }}

    steps:
      - name: Checkout this repo
        uses: actions/checkout@v6
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          path: dist/
          merge-multiple: true

      - name: Show collected artifacts
        run: ls -lhR dist/

      - name: Generate checksums (SHA256)
        run: |
          cd dist
          sha256sum * > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create release and upload assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$TAG" \
            --title "amneziawg-tools $TAG" \
            --notes "## amneziawg-tools $TAG

          Автоматическая сборка из upstream-тега [$TAG](https://github.com/amnezia-vpn/amneziawg-tools/releases/tag/$TAG).

          ### Linux
          Два варианта сборки на выбор:
          - **ubuntu** — glibc, совместим с Ubuntu/Debian/CentOS и большинством дистрибутивов
          - **alpine** — musl libc, минимальные зависимости, подходит для контейнеров и embedded

          | ОС    | Libc   | Архитектура | Файл |
          |-------|--------|-------------|------|
          | Linux | glibc  | x64         | \`linux-ubuntu-x64.tar.gz\` |
          | Linux | musl   | x64         | \`linux-alpine-x64.tar.gz\` |
          | Linux | musl   | arm64       | \`linux-alpine-arm64.tar.gz\` |

          ### Windows
          Собрано через нативный \`build.cmd\` из репозитория.

          | ОС      | Архитектура | Файл |
          |---------|-------------|------|
          | Windows | x64         | \`windows-x64.zip\` |
          | Windows | x86         | \`windows-x86.zip\` |
          | Windows | arm64       | \`windows-arm64.zip\` |

          ### Содержимое Linux-архивов
          - \`awg\` — основной инструмент управления AmneziaWG
          - \`awg-quick\` — скрипт быстрой настройки интерфейса

          > SHA256-суммы всех файлов — в \`SHA256SUMS.txt\`" \
            dist/*

      - name: Mark tag as built
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "built/$TAG" || true
          git push origin "built/$TAG" || true
