name: Check and Build amneziawg-tools

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:
    inputs:
      force_tag:
        description: 'Принудительно собрать конкретный тег (например v1.0.0)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  # ─────────────────────────────────────────────
  # 1. Проверяем новый тег
  # ─────────────────────────────────────────────
  check-new-tag:
    name: Check for new upstream tag
    runs-on: ubuntu-latest
    outputs:
      new_tag:      ${{ steps.compare.outputs.new_tag }}
      should_build: ${{ steps.compare.outputs.should_build }}

    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          fetch-depth: 0

      - name: Get latest upstream tag
        id: upstream
        run: |
          LATEST=$(curl -sf \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/amnezia-vpn/amneziawg-tools/tags?per_page=1" \
            | jq -r '.[0].name')

          if [ -z "$LATEST" ] || [ "$LATEST" = "null" ]; then
            echo "::error::Не удалось получить теги upstream-репозитория"
            exit 1
          fi

          echo "tag=$LATEST" >> "$GITHUB_OUTPUT"
          echo "Последний upstream-тег: $LATEST"

      - name: Get last built tag from this repo
        id: local
        run: |
          LAST_BUILT=$(git tag --list 'built/*' \
            | sed 's|built/||' \
            | sort -V \
            | tail -1)

          echo "tag=${LAST_BUILT:-none}" >> "$GITHUB_OUTPUT"
          echo "Последний собранный тег: ${LAST_BUILT:-none}"

      - name: Compare tags
        id: compare
        run: |
          UPSTREAM="${{ steps.upstream.outputs.tag }}"
          LOCAL="${{ steps.local.outputs.tag }}"
          FORCE="${{ github.event.inputs.force_tag }}"

          if [ -n "$FORCE" ]; then
            echo "Принудительная сборка тега: $FORCE"
            echo "new_tag=$FORCE"     >> "$GITHUB_OUTPUT"
            echo "should_build=true"  >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$UPSTREAM" != "$LOCAL" ]; then
            echo "Обнаружен новый тег: $UPSTREAM (предыдущий: $LOCAL)"
            echo "new_tag=$UPSTREAM"  >> "$GITHUB_OUTPUT"
            echo "should_build=true"  >> "$GITHUB_OUTPUT"
          else
            echo "Новых тегов нет. Сборка не требуется."
            echo "new_tag=$UPSTREAM"  >> "$GITHUB_OUTPUT"
            echo "should_build=false" >> "$GITHUB_OUTPUT"
          fi

  # ─────────────────────────────────────────────
  # 2. Сборка (только Linux, нативная + кросс)
  # ─────────────────────────────────────────────
  build:
    name: Build linux-${{ matrix.arch_label }}
    needs: check-new-tag
    if: needs.check-new-tag.outputs.should_build == 'true'
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch_label: x64
            cc: gcc
            # Никаких дополнительных пакетов — родная сборка

          - arch_label: x86
            cc: gcc
            # -m32 через CFLAGS, нужен пакет gcc-multilib
            extra_packages: gcc-multilib
            cflags: -m32
            ldflags: -m32

          - arch_label: arm64
            cc: aarch64-linux-gnu-gcc
            extra_packages: gcc-aarch64-linux-gnu

          - arch_label: arm
            cc: arm-linux-gnueabihf-gcc
            extra_packages: gcc-arm-linux-gnueabihf

    env:
      TAG:      ${{ needs.check-new-tag.outputs.new_tag }}
      APP_NAME: amneziawg-tools

    steps:
      - name: Install cross-compiler
        if: matrix.extra_packages != ''
        run: |
          sudo apt-get update -q
          sudo apt-get install -y ${{ matrix.extra_packages }}

      - name: Clone upstream source at tag ${{ env.TAG }}
        run: |
          git clone --depth 1 --branch "$TAG" \
            https://github.com/amnezia-vpn/amneziawg-tools.git src

      - name: Build
        working-directory: src/src
        run: |
          make -j"$(nproc)" \
            CC="${{ matrix.cc }}" \
            CFLAGS="${{ matrix.cflags }}" \
            LDFLAGS="${{ matrix.ldflags }}" \
            WITH_BASHCOMPLETION=no \
            WITH_WGQUICK=no \
            WITH_SYSTEMDUNITS=no

          echo "--- собранные бинарники ---"
          ls -lh awg awg-quick 2>/dev/null || ls -lh

      - name: Collect binaries
        working-directory: src/src
        run: |
          STAGING="staging"
          mkdir "$STAGING"

          # Копируем основные бинарники (awg обязателен, awg-quick — bash-скрипт)
          cp awg "$STAGING/"
          [ -f awg-quick ] && cp awg-quick "$STAGING/" || true

          ls -lh "$STAGING"

      - name: Package artifact
        working-directory: src/src
        run: |
          ARCHIVE="${APP_NAME}-linux-${{ matrix.arch_label }}.tar.gz"
          tar -czf "$ARCHIVE" -C staging .
          echo "ARCHIVE_PATH=src/src/$ARCHIVE" >> "$GITHUB_ENV"
          ls -lh "$ARCHIVE"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          name: ${{ env.APP_NAME }}-linux-${{ matrix.arch_label }}
          path: ${{ env.ARCHIVE_PATH }}
          retention-days: 1

  # ─────────────────────────────────────────────
  # 3. Релиз
  # ─────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [check-new-tag, build]
    runs-on: ubuntu-latest
    env:
      TAG: ${{ needs.check-new-tag.outputs.new_tag }}

    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          path: dist/
          merge-multiple: true

      - name: Generate checksums (SHA256)
        run: |
          cd dist
          sha256sum * > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create release and upload assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$TAG" \
            --title "amneziawg-tools $TAG" \
            --notes "## amneziawg-tools $TAG

          Автоматическая сборка из upstream-тега [$TAG](https://github.com/amnezia-vpn/amneziawg-tools/releases/tag/$TAG).

          > macOS и Windows не включены: утилиты являются POSIX-специфичными
          > и предназначены исключительно для Linux.

          ### Платформы
          | ОС    | Архитектура | Файл |
          |-------|-------------|------|
          | Linux | x64         | \`amneziawg-tools-linux-x64.tar.gz\` |
          | Linux | x86         | \`amneziawg-tools-linux-x86.tar.gz\` |
          | Linux | arm64       | \`amneziawg-tools-linux-arm64.tar.gz\` |
          | Linux | arm (v7)    | \`amneziawg-tools-linux-arm.tar.gz\` |

          ### Содержимое архивов
          - \`awg\` — основной инструмент управления AmneziaWG
          - \`awg-quick\` — скрипт быстрой настройки интерфейса (если применимо)

          > SHA256-суммы всех файлов — в \`SHA256SUMS.txt\`" \
            dist/*

      - name: Mark tag as built
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "built/$TAG" || true
          git push origin "built/$TAG" || true
